backend:
  name: github
  repo: yuto-masuki-hue/ai-kicho-manual
  branch: main

publish_mode: simple

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "docs"
    label: "マニュアルページ"
    folder: "docs"
    create: false
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "タイトル", name: "title", widget: "string", required: false }
      - { label: "並び順", name: "sidebar_position", widget: "number", required: false }
      - { label: "本文", name: "body", widget: "markdown" }

  - name: "changelog"
    label: "更新履歴"
    folder: "blog"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "日付", name: "date", widget: "datetime" }
      - { label: "内容", name: "body", widget: "markdown" }